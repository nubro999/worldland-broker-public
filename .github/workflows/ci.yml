name: CI

on:
  push:
    branches: [main, mvp]
  pull_request:
    branches: [main]

# Cancel in-flight runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Go backend: k8s-proxy-server
  # vet, build all three binaries (server, provider-agent, provider-sdk),
  # run unit tests.
  # ─────────────────────────────────────────────────────────────────────
  go-backend:
    name: Go backend (vet + build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: k8s-proxy-server
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true
          cache-dependency-path: k8s-proxy-server/go.sum

      - name: Download modules
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: Build server binary
        run: go build -o /tmp/server ./cmd/server

      - name: Build provider-agent binary
        run: go build -o /tmp/provider-agent ./cmd/provider-agent

      - name: Build provider-sdk binary
        run: go build -o /tmp/provider-sdk ./cmd/provider-sdk

      - name: Run unit tests
        run: go test -count=1 ./...

  # ─────────────────────────────────────────────────────────────────────
  # Docker image build — verifies the production Dockerfile still builds.
  # No push: this job exists to catch breakage early.
  # ─────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker image build (no push)
    runs-on: ubuntu-latest
    needs: go-backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: k8s-proxy-server
          file: k8s-proxy-server/deploy/docker/Dockerfile
          push: false
          tags: k8s-proxy-server:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────
  # Solidity contracts (Hardhat)
  # ─────────────────────────────────────────────────────────────────────
  contracts:
    name: Solidity (Hardhat)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: contracts/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Compile contracts
        run: npx hardhat compile

      - name: Run tests
        run: npx hardhat test

  # ─────────────────────────────────────────────────────────────────────
  # Frontend (Next.js) — typecheck via build + ESLint
  # ─────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
