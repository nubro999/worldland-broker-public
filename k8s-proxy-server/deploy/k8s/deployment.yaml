apiVersion: apps/v1
kind: Deployment
metadata:
  name: proxy-server
  namespace: web3-ai
  labels:
    app: proxy-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: proxy-server
  template:
    metadata:
      labels:
        app: proxy-server
    spec:
      serviceAccountName: proxy-sa
      containers:
        - name: server
          image: k8s-proxy-server:latest  # TODO: 실제 레지스트리 주소로 변경
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            # ConfigMap에서 가져오는 설정
            - name: PROXY_PORT
              valueFrom:
                configMapKeyRef:
                  name: proxy-config
                  key: PROXY_PORT
            - name: DEBUG_MODE
              valueFrom:
                configMapKeyRef:
                  name: proxy-config
                  key: DEBUG_MODE
            # Secret에서 가져오는 민감한 정보
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: proxy-secret
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: proxy-secret
                  key: GOOGLE_CLIENT_SECRET
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: proxy-secret
                  key: JWT_SECRET
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
